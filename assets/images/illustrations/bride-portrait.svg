  <path d="M105 250 C130 262 170 262 195 250" fill="none" stroke="#D8BE7A" stroke-width="1" opacity="0.7"/>

  <!-- neck -->
  <path d="M132 195 C132 210 132 218 150 222 C168 218 168 210 168 195 Z" fill="url(#bSkin)"/>

  <!-- hijab -->
  <path d="M92 120 C92 82 118 55 150 55 C183 55 208 82 208 122 C208 150 195 168 184 178 C204 195 214 218 216 240 C222 210 216 182 200 165 C210 152 212 136 205 122 C190 88 112 88 96 122 C90 136 92 150 100 162 C82 178 70 205 74 240 C76 210 88 190 108 178 C97 168 90 150 92 120 Z"
        fill="url(#bHijab)" stroke="#C8A95A" stroke-width="1.1"/>
  <path d="M115 112 C115 90 130 74 150 74 C171 74 186 90 186 113 C186 138 171 158 150 161 C130 158 115 138 115 112 Z" fill="url(#bSkin)"/>
  <path d="M132 118 q6 4 0 8" fill="none" stroke="#B08A63" stroke-width="1.1" opacity="0.7"/>
  <path d="M168 118 q-6 4 0 8" fill="none" stroke="#B08A63" stroke-width="1.1" opacity="0.7"/>
  <path d="M142 141 q8 6 16 0" fill="none" stroke="#B08A63" stroke-width="1.1" opacity="0.6"/>
  <path d="M120 92 C132 82 168 82 180 92" fill="none" stroke="#C8A95A" stroke-width="1.6"/>
  <circle cx="150" cy="86" r="3" fill="#C8A95A"/>

  <!-- gold earring accent -->
  <circle cx="118" cy="150" r="2.4" fill="#C8A95A"/>
  <circle cx="182" cy="150" r="2.4" fill="#C8A95A"/>
