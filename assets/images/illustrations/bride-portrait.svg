<svg viewBox="0 0 300 340" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Illustration of the bride">
  <defs>
    <linearGradient id="bSkin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F3E3D0"/><stop offset="100%" stop-color="#EAD3BB"/>
    </linearGradient>
    <linearGradient id="bHijab" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EFE1C3"/><stop offset="100%" stop-color="#DCC48D"/>
    </linearGradient>
    <linearGradient id="bDress" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBF8F1"/><stop offset="100%" stop-color="#F0E6D2"/>
    </linearGradient>
    <radialGradient id="bGlow" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FFFDF6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FFFDF6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="150" cy="150" r="140" fill="url(#bGlow)"/>
  <circle cx="150" cy="150" r="128" fill="none" stroke="#C8A95A" stroke-width="1"/>

